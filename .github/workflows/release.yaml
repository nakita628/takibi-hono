name: release

on:
  workflow_run:
    workflows: [deploy]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ github.event.workflow_run.head_sha }}
        run: |
          VERSION=$(jq -r .version packages/takibi-hono/package.json)
          gh release view "v$VERSION" >/dev/null 2>&1 && { echo "release v$VERSION already exists; skip"; exit 0; }
          gh release create "v$VERSION" --generate-notes --target "$TARGET"
