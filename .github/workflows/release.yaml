name: release

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check version change
        id: ver
        run: |
          CUR=$(jq -r .version packages/takibi-hono/package.json)
          git fetch --tags --depth=1 --quiet origin "refs/tags/v$CUR" 2>/dev/null || true
          git rev-parse -q --verify "refs/tags/v$CUR" >/dev/null || echo "version=$CUR" >> $GITHUB_OUTPUT

      - name: Create release
        if: steps.ver.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          TARGET: ${{ github.event.workflow_run.head_sha }}
        run: gh release create "v$VERSION" --generate-notes --target "$TARGET"
